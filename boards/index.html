<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />

  <meta name="theme-color" content="#0a0908" />

  <meta name="description" content="Soleil Clusters is a creative workspace and moodboard tool for film, photo, design, and brand teams — organize references, projects, and ideas in one place." />

  <link rel="preconnect" href="https://use.typekit.net" crossorigin />
  <link rel="stylesheet" href="https://use.typekit.net/qtd2rwk.css" />

  <link rel="icon" type="image/png" href="/favicon.png" />
  <link rel="apple-touch-icon" href="/favicon.png" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="canonical" href="https://clusters.soleilpictures.com/" />

  <!-- Open Graph -->
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="Soleil Clusters" />
  <meta property="og:url" content="https://clusters.soleilpictures.com/" />
  <meta property="og:title" content="Soleil Clusters — Creative Workspace & Moodboard for Production Teams" />
  <meta property="og:description" content="Soleil Clusters is a creative workspace and moodboard tool for film, photo, design, and brand teams — organize references, projects, and ideas in one place." />
  <meta property="og:image" content="https://clusters.soleilpictures.com/clusters-logo-dark.png" />
  <meta property="og:image:width" content="2048" />
  <meta property="og:image:height" content="2048" />
  <meta property="og:image:type" content="image/png" />
  <meta property="og:image:alt" content="Soleil Clusters mark" />
  <meta property="og:locale" content="en_US" />

  <!-- Twitter card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Soleil Clusters — Creative Workspace & Moodboard for Production Teams" />
  <meta name="twitter:description" content="Soleil Clusters is a creative workspace and moodboard tool for film, photo, design, and brand teams — organize references, projects, and ideas in one place." />
  <meta name="twitter:image" content="https://clusters.soleilpictures.com/clusters-logo-dark.png" />
  <meta name="twitter:image:alt" content="Soleil Clusters mark" />

  <!-- Structured data: WebSite + SoftwareApplication, linked to the existing
       Soleil Pictures Organization on the root domain so Google connects the
       two entities and Clusters inherits brand authority. -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@graph": [
      {
        "@type": "WebSite",
        "@id": "https://clusters.soleilpictures.com/#website",
        "url": "https://clusters.soleilpictures.com/",
        "name": "Soleil Clusters",
        "inLanguage": "en-US",
        "publisher": { "@id": "https://soleilpictures.com/#organization" }
      },
      {
        "@type": "SoftwareApplication",
        "@id": "https://clusters.soleilpictures.com/#app",
        "name": "Soleil Clusters",
        "alternateName": "Clusters",
        "url": "https://clusters.soleilpictures.com/",
        "applicationCategory": "BusinessApplication",
        "applicationSubCategory": "Project Management",
        "operatingSystem": "Web",
        "sameAs": [
          "https://www.instagram.com/soleilclusters",
          "https://x.com/soleilclusters"
        ],
        "image": "https://clusters.soleilpictures.com/clusters-logo-dark.png",
        "description": "Soleil Clusters is a creative workspace and moodboard tool for film, photo, design, and brand teams — organize references, projects, and ideas in one place.",
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "USD"
        },
        "publisher": { "@id": "https://soleilpictures.com/#organization" }
      },
      {
        "@type": "Organization",
        "@id": "https://soleilpictures.com/#organization",
        "name": "Soleil Pictures",
        "url": "https://soleilpictures.com/"
      }
    ]
  }
  </script>

  <!-- Bootstrap user UI prefs BEFORE React mounts so theme/clean-mode/
       accent don't flicker for ~200ms on every cold start. We read
       the cached blob written by App.jsx to localStorage on each save
       (key 'soleil.ui'). Server settings overwrite this once they
       resolve. -->
  <script>
    (function () {
      try {
        var raw = localStorage.getItem('soleil.ui');
        if (!raw) return;
        var ui = JSON.parse(raw) || {};
        if (ui.theme) document.documentElement.setAttribute('data-theme', ui.theme);
        if (ui.hideChrome) document.body && document.body.setAttribute('data-clean-mode', '1');
        // Inject accent + font overrides into a style tag we'll
        // reuse from React so we don't double-up.
        var rules = [];
        if (ui.accent) {
          var hex = ui.accent;
          var r = parseInt(hex.slice(1,3), 16) || 212;
          var g = parseInt(hex.slice(3,5), 16) || 160;
          var b = parseInt(hex.slice(5,7), 16) || 74;
          rules.push(":root, [data-theme='light'] {"
            + " --soleil: " + hex + ";"
            + " --soleil-soft: rgba(" + r + "," + g + "," + b + ",.14);"
            + " --soleil-glow: 0 0 24px rgba(" + r + "," + g + "," + b + ",.18);"
            + " --accent: " + hex + ";"
            + " }");
        }
        if (ui.fontSans) {
          rules.push(":root, [data-theme='light'] { --font-sans: " + ui.fontSans + "; }");
        }
        if (rules.length) {
          var s = document.createElement('style');
          s.id = 'user-theme-overrides';
          s.textContent = rules.join('\n');
          (document.head || document.documentElement).appendChild(s);
        }
      } catch (_) { /* malformed cache → ignore */ }
    })();
    // Body might not exist yet at script run; defer the clean-mode
    // attribute set to a microtask if needed.
    document.addEventListener('DOMContentLoaded', function () {
      try {
        var raw = localStorage.getItem('soleil.ui');
        if (!raw) return;
        var ui = JSON.parse(raw) || {};
        if (ui.hideChrome) document.body.setAttribute('data-clean-mode', '1');
      } catch (_) {}
    });
  </script>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
