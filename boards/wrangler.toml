# Cloudflare Workers Builds config for Soleil Boards.
# Worker entry handles /api/* routes (currently just /api/og for link
# previews); everything else falls through to env.ASSETS which serves
# the Vite-built dist/, with SPA fallback so /any/route hits index.html.

name = "soleil-boards"
main = "src/worker.js"
compatibility_date = "2025-01-01"

# Keep workers.dev enabled as a fallback URL while custom domain wiring
# settles (custom domain is bound via the CF dashboard, not via routes
# here, because zone provisioning needs to happen interactively).
workers_dev = true

# Public Supabase config used by the /api/tags/* routes to verify the
# user's JWT against /auth/v1/user. Both values are public-by-design
# (the anon key is gated by RLS, not secrecy) — safe to commit.
# OPENAI_API_KEY is set separately via `wrangler secret put OPENAI_API_KEY`.
[vars]
SUPABASE_URL = "https://ehlhlmbpwwalmeisvmdp.supabase.co"
SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVobGhsbWJwd3dhbG1laXN2bWRwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3NzYxNTIsImV4cCI6MjA5MzM1MjE1Mn0.gEySom06_L90FXAuTAz2S9rbQk-WNk6K3aReb2EwH1Y"

[assets]
directory = "./dist"
not_found_handling = "single-page-application"
binding = "ASSETS"

# Scheduled R2 orphan sweep — runs daily at 04:00 UTC, after the pg_cron
# retention jobs (03:00–03:10) have finished hard-purging soft-deleted
# rows. The Worker scans the `images` table for rows whose card no longer
# exists in card_index and which are older than 30 days, then deletes
# both the R2 object and the images row. Safe no-ops if the R2 binding
# or SUPABASE_SERVICE_ROLE_KEY secret is missing.
[triggers]
crons = ["0 4 * * *"]

# R2 binding for the orphan sweeper. Bucket name must match the bucket
# uploads go to (set via PartyKit's R2_BUCKET env var). Uncomment + set
# the correct bucket_name before relying on the sweep; until then the
# scheduled() handler logs and skips.
# [[r2_buckets]]
# binding    = "IMAGES"
# bucket_name = "soleil-images"

# Required secret (set via `wrangler secret put SUPABASE_SERVICE_ROLE_KEY`)
# for the R2 sweep to call SECURITY DEFINER RPCs (find_orphan_images,
# delete_image_rows). Without it the sweep logs and skips.
