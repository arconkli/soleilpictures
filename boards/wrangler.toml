# Cloudflare Workers Builds config for Soleil Boards.
# Worker entry handles /api/* routes (currently just /api/og for link
# previews); everything else falls through to env.ASSETS which serves
# the Vite-built dist/, with SPA fallback so /any/route hits index.html.

name = "soleil-boards"
main = "src/worker.js"
compatibility_date = "2025-01-01"

# Keep workers.dev enabled as a fallback URL while custom domain wiring
# settles (custom domain is bound via the CF dashboard, not via routes
# here, because zone provisioning needs to happen interactively).
workers_dev = true

# Retain Worker logs (fetch + scheduled handlers) in the Cloudflare dashboard
# so server-side errors caught in worker.js (/api/* try-catch + cron jobs) are
# inspectable. Client-side crashes go to Sentry; this is the server-side half.
# A fuller @sentry/cloudflare withSentry() wrapper is a possible follow-up.
[observability]
enabled = true

# Public Supabase config used by the /api/tags/* routes to verify the
# user's JWT against /auth/v1/user. Both values are public-by-design
# (the anon key is gated by RLS, not secrecy) — safe to commit.
# OPENAI_API_KEY is set separately via `wrangler secret put OPENAI_API_KEY`.
[vars]
SUPABASE_URL = "https://ehlhlmbpwwalmeisvmdp.supabase.co"
SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVobGhsbWJwd3dhbG1laXN2bWRwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3NzYxNTIsImV4cCI6MjA5MzM1MjE1Mn0.gEySom06_L90FXAuTAz2S9rbQk-WNk6K3aReb2EwH1Y"

[assets]
directory = "./dist"
not_found_handling = "single-page-application"
binding = "ASSETS"

# Cloudflare Workers AI — powers the admin SEO tooling (/api/seo/*): a vision
# model captions board images for alt text, a text model drafts SEO copy.
# Free in-worker tier, no API key/credits. See boards/src/worker-seo.js.
[ai]
binding = "AI"

# Scheduled R2 orphan sweep — runs daily at 04:00 UTC, after the pg_cron
# retention jobs (03:00–03:10) have finished hard-purging soft-deleted
# rows. The Worker scans the `images` table for rows whose card no longer
# exists in card_index and which are older than 30 days, then deletes
# both the R2 object and the images row. Safe no-ops if the R2 binding
# or SUPABASE_SERVICE_ROLE_KEY secret is missing.
[triggers]
# Daily 04:00 UTC: history-aware R2 orphan sweep (dry-run by default).
# Hourly at :15:     Job 1 compaction — board_ops → R2 hourly batches (dry-run by default).
# event.cron lets the worker dispatch to the right handler in scheduled().
# To enable actual writes/deletes, set HISTORY_COMPACTION_MODE=run and/or
# R2_SWEEP_MODE=delete via `wrangler secret put`.
crons = ["0 4 * * *", "15 * * * *"]

# R2 binding for the orphan sweeper. Matches PartyKit's R2_BUCKET so
# the same bucket uploads go into is the one being swept.
[[r2_buckets]]
binding     = "IMAGES"
bucket_name = "soleil-boards-images"

# Required secret (set via `wrangler secret put SUPABASE_SERVICE_ROLE_KEY`)
# for the R2 sweep to call SECURITY DEFINER RPCs (find_orphan_images,
# delete_image_rows). Without it the sweep logs and skips.

# ── Staging environment ──────────────────────────────────────────────────
# A second Worker, `soleil-boards-staging`, built from the `main` branch (via
# its own Cloudflare Workers Build) and reachable at the stable URL
# soleil-boards-staging.<subdomain>.workers.dev. It runs the SAME code as prod
# but is where every push lands FIRST. The prod Worker proxies eligible admins
# here (see proxyToStaging in src/worker.js), so admins auto-test the latest
# build on the real domain with their session intact; everyone else stays on
# prod. Promote = `git push origin main:production` (prod build watches that).
#
# Named environments do NOT inherit bindings/vars, so the non-inheritable
# blocks (vars/assets/ai/r2_buckets) are repeated here. `main`,
# `compatibility_date`, `workers_dev`, and `observability` DO inherit from the
# top level. Deploy with: `npx wrangler deploy --env staging`.
[env.staging]
name = "soleil-boards-staging"

# Same shared backend as prod (this is intentional — staging exercises the live
# Supabase/R2). ENVIRONMENT lets the shared worker.js know it's the staging
# Worker so it NEVER proxies (loop guard) and serves a noindex + a
# window.__env='staging' marker for the client indicator.
[env.staging.vars]
SUPABASE_URL = "https://ehlhlmbpwwalmeisvmdp.supabase.co"
SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVobGhsbWJwd3dhbG1laXN2bWRwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3NzYxNTIsImV4cCI6MjA5MzM1MjE1Mn0.gEySom06_L90FXAuTAz2S9rbQk-WNk6K3aReb2EwH1Y"
ENVIRONMENT = "staging"

[env.staging.assets]
directory = "./dist"
not_found_handling = "single-page-application"
binding = "ASSETS"

[env.staging.ai]
binding = "AI"

[[env.staging.r2_buckets]]
binding     = "IMAGES"
bucket_name = "soleil-boards-images"

# NO crons on staging. The R2 orphan sweep + history compaction act on the
# SHARED prod R2 bucket / Supabase DB — a second runner would double-process
# (and the sweep is destructive once its mode flips). Only the prod Worker runs
# the scheduled jobs.
[env.staging.triggers]
crons = []
