# Cloudflare Workers Builds config for Soleil Boards.
# Worker entry handles /api/* routes (currently just /api/og for link
# previews); everything else falls through to env.ASSETS which serves
# the Vite-built dist/, with SPA fallback so /any/route hits index.html.

name = "soleil-boards"
main = "src/worker.js"
compatibility_date = "2025-01-01"

# Keep workers.dev enabled as a fallback URL while custom domain wiring
# settles (custom domain is bound via the CF dashboard, not via routes
# here, because zone provisioning needs to happen interactively).
workers_dev = true

[assets]
directory = "./dist"
not_found_handling = "single-page-application"
binding = "ASSETS"
