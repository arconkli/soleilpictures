# Cloudflare Workers Builds config for Soleil Boards.
# Static-only deploy: no Worker code, just the Vite-built dist/ served via
# Cloudflare's Static Assets, with SPA fallback so /any/route hits index.html
# (the magic-link auth callback /?code=... and any future client routes).

name = "soleil-boards"
compatibility_date = "2025-01-01"

# Keep workers.dev enabled as a fallback URL while custom domain wiring
# settles (custom domain is bound via the CF dashboard, not via routes
# here, because zone provisioning needs to happen interactively).
workers_dev = true

[assets]
directory = "./dist"
not_found_handling = "single-page-application"
