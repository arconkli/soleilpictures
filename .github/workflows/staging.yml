# Deploy the staging Worker (soleil-boards-staging) on every push to main.
# This is the "latest build" that the prod Worker proxies ring-eligible admins
# to (see boards/src/worker.js proxyToStaging). It serves ONLY the static SPA +
# assets, so it needs NO secrets of its own — the only auth here is the
# Cloudflare API token used to deploy.
#
# Required GitHub repo secrets (Settings → Secrets and variables → Actions):
#   CLOUDFLARE_API_TOKEN   — token with "Edit Cloudflare Workers" permission
#   CLOUDFLARE_ACCOUNT_ID  — your Cloudflare account id
#
# Promote to everyone is unchanged and separate: `git push origin main:production`.
name: deploy-staging

on:
  push:
    branches: [main]

permissions:
  contents: read

# One staging deploy at a time; newer pushes cancel an in-flight build.
concurrency:
  group: staging-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: boards
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # vite.config.js stamps VITE_RELEASE from the git short SHA
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: boards/package-lock.json
      - run: npm ci
      - run: npm run build
      - name: Deploy staging Worker
        run: npx --yes wrangler@4 deploy --env staging
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
