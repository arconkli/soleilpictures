<!DOCTYPE html>
<!--
  Soleil Clusters — Magic Link / OTP email template.

  Paste into Supabase Dashboard → Auth → Email Templates → "Magic Link".
  Recommended subject line: "Your Clusters sign-in code"

  Token is rendered via {{ .Token }}. We deliberately do NOT include the
  {{ .ConfirmationURL }} link — disposable / corporate scanners prefetch
  links and consume one-time tokens, blowing up the OTP flow.

  Layout is table-based for max email-client compatibility (Gmail,
  Outlook, Apple Mail, Yahoo). All styles are inline. Dark-mode is
  handled via the `prefers-color-scheme` block + Apple/Outlook hint
  meta tags below.
-->
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <meta name="color-scheme" content="light dark">
    <meta name="supported-color-schemes" content="light dark">
    <title>Your Clusters sign-in code</title>
    <style>
      @media (prefers-color-scheme: dark) {
        body, .bg { background: #0a0a0c !important; }
        .card    { background: #15151a !important; border-color: #2a2a30 !important; }
        .ink     { color: #f5f5f7 !important; }
        .ink-2   { color: #b3b3b7 !important; }
        .ink-3   { color: #8a8a8e !important; }
        .code-tile { background: rgba(255,165,0,0.10) !important; border-color: rgba(255,165,0,0.35) !important; }
      }
      /* Hide preheader text in the email body */
      .preheader { display: none !important; visibility: hidden; opacity: 0; color: transparent; height: 0; width: 0; }
    </style>
  </head>
  <body class="bg" style="margin:0; padding:0; background:#f5f5f7; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif; color:#0a0a0c; -webkit-font-smoothing:antialiased;">
    <span class="preheader">Your Clusters sign-in code: {{ .Token }}</span>

    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" class="bg" style="background:#f5f5f7;">
      <tr>
        <td align="center" style="padding:56px 20px;">
          <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="max-width:440px;">

            <!-- Wordmark -->
            <tr>
              <td align="center" style="padding-bottom:32px;">
                <div class="ink" style="font:700 16px/1 -apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif; letter-spacing:0.22em; text-transform:uppercase; color:#0a0a0c;">
                  Clusters
                </div>
              </td>
            </tr>

            <!-- Card -->
            <tr>
              <td class="card" style="background:#ffffff; border:1px solid #eaeaee; border-radius:14px; padding:40px 32px;">

                <div style="font:600 11px/1 -apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif; letter-spacing:0.18em; text-transform:uppercase; color:#ffa500; text-align:center; padding-bottom:14px;">
                  Sign-in code
                </div>

                <div class="ink" style="font:600 22px/1.25 -apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif; color:#0a0a0c; text-align:center; padding-bottom:10px; letter-spacing:-0.01em;">
                  Here's your code
                </div>

                <div class="ink-2" style="font:400 14px/1.55 -apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif; color:#5a5a60; text-align:center; padding-bottom:28px;">
                  Enter this 6-digit code in the sign-in screen.<br>It'll expire in 10&nbsp;minutes.
                </div>

                <!-- Code tile -->
                <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0">
                  <tr>
                    <td class="code-tile" align="center" style="background:#fff7ec; border:1px solid #ffe2b3; border-radius:10px; padding:22px 16px;">
                      <div class="ink" style="font:700 30px/1 ui-monospace,SFMono-Regular,Menlo,Consolas,monospace; letter-spacing:0.5em; color:#0a0a0c; padding-left:0.5em;">
                        {{ .Token }}
                      </div>
                    </td>
                  </tr>
                </table>

                <div class="ink-3" style="font:400 12px/1.55 -apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif; color:#8a8a8e; text-align:center; padding-top:24px;">
                  Didn't request this? You can safely ignore this email.
                </div>

              </td>
            </tr>

            <!-- Footer -->
            <tr>
              <td align="center" style="padding-top:24px;">
                <div class="ink-3" style="font:400 11px/1.5 -apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif; color:#8a8a8e; letter-spacing:0.04em;">
                  © Soleil Pictures · clusters.soleilpictures.com
                </div>
              </td>
            </tr>

          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
